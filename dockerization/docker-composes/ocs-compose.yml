version: "3.8"

services:

  account-balance-management-function:
    image: beko2001/account-balance-management-function:latest
    ports:
      - "5832:5832"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - ocs-network

  account-order-management:
    image: beko2001/account-order-management:latest
    ports:
      - "5831:5831"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - ocs-network

  charging-gateway-function:
    image: beko2001/charging-gateway-function:latest
    ports:
      - "5833:5833"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - ocs-network

  notification-function:
    image: beko2001/notification-function:latest
    ports:
      - "5834:5834"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - ocs-network

  online-charging-system:
    image: beko2001/online-charging-system:latest
    ports:
      - "8071:8071"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - ocs-network

  diameter-gateway:
    image: beko2001/diameter-gateway:latest
    ports:
      - "5855:5855"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - ocs-network

networks:
  ocs-network:
    external: true
